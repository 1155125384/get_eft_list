name: Hourly Notebook Run
on:
  schedule:
    - cron: '0 * * * *' # Every hour
jobs:
  run_notebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install Dependencies
        run: |
          pip3 install jupyter papermill ipykernel
          pip3 install mstarpy
          pip3 install yfinance
          pip3 install tqdm 

      - name: Execute Notebook
        run: |
          papermill analysis.ipynb output.ipynb

      - name: Commit and Push Output (Optional)
        run: |
          git add gen_etf_list.ipynb
          git commit -m "Hourly notebook update"
          git push
